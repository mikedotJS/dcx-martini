name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASED_URL: ${{ secrets.VITE_BASED_URL }}
          VITE_BASED_ANON_KEY: ${{ secrets.VITE_BASED_ANON_KEY }}
          VITE_BASED_SERVICE_EMAIL: ${{ secrets.VITE_BASED_SERVICE_EMAIL }}
          VITE_BASED_SERVICE_PASSWORD: ${{ secrets.VITE_BASED_SERVICE_PASSWORD }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - id: deployment
        uses: actions/deploy-pages@v4
